{% extends 'base.html' %}

{% block content %}

<h1>Dashboard</h1>

<div class="cards">

<div class="card">Total: {{total}}</div>
<div class="card">Completed: {{completed}}</div>
<div class="card">Pending: {{pending}}</div>

</div>

<form method="POST" action="/add/" class="task-form">
{% csrf_token %}

<input type="text" name="title" placeholder="Add task..." required>

<select name="priority">
<option>High</option>
<option>Medium</option>
<option>Low</option>
</select>

<input type="date" name="due_date">

<button>Add</button>

</form>

<ul class="task-list">

{% for task in tasks %}

<li class="{% if task.completed %}done{% endif %}">

<span>{{task.title}} ({{task.priority}})</span>

<div>
<a href="/complete/{{task.id}}/">✔</a>
<a href="/delete/{{task.id}}/">❌</a>
</div>

</li>

<div class="card">🔥 Streak: {{streak}} days</div>

{% endfor %}

</ul>

{% endblock %}
